<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f5f2;
      color: #222;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      max-width: 700px;
      line-height: 1.6;
    }

    .button {
      margin-top: 30px;
      background: black;
      color: white;
      padding: 15px 30px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 18px;
    }

    .features {
      padding: 80px 20px;
      background: white;
      text-align: center;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #f5f5f5;
      padding: 30px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>GOGOU PET</h1>

    <p>
      Natural tofu cat litter for UK pet lovers.
      Low dust, strong odor control, flushable and cat-approved.
    </p>

    <a class="button" href="#">
      Shop Now
    </a>
  </section>

  <section class="features">
    <h2>Why Pet Owners Love It</h2>

    <div class="feature-grid">

      <div class="card">
        <h3>Low Dust</h3>
        <p>Cleaner home and healthier breathing.</p>
      </div>

      <div class="card">
        <h3>Flushable</h3>
        <p>Easy cleaning for busy cat parents.</p>
      </div>

      <div class="card">
        <h3>Strong Odor Control</h3>
        <p>Keep your home fresh every day.</p>
      </div>

    </div>
  </section>

</body>
</html>
